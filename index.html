<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nifty Quantum Screener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css?v=6">
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

    <!-- Live Ticker Bar -->
    <div class="ticker-bar">
        <div class="ticker-inner">
            <span class="ticker-label">LIVE</span>
            <div id="ticker-nifty" class="ticker-item">NIFTY <span class="ticker-val">—</span></div>
            <div class="ticker-sep">|</div>
            <div id="ticker-sectors" class="ticker-sectors">
                <span style="color:var(--text-sub); font-size:0.75rem;">Connecting to live feed...</span>
            </div>
            <div class="ticker-sep">|</div>
            <div id="ticker-time" class="ticker-time">--:--:-- IST</div>
            <div id="ticker-market-status" class="market-pill closed">CLOSED</div>
        </div>
    </div>

    <div class="app-shell">
        <div class="header">
            <div class="title-section">
                <div class="title-eyebrow">NSE · LIVE ANALYTICS</div>
                <h1>Quantum<br><span class="title-accent">Screener</span></h1>
                <p class="subtitle">Sector → EMA → OI Breakout Pipeline</p>
            </div>
            <div id="nifty-status-container">
                <div class="nifty-card loading-state">
                    <div class="loader"></div>
                    <div class="nifty-label">Connecting...</div>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="sidebar">
                <div class="card sectors-card">
                    <div class="card-header">
                        <h2>Sectors</h2>
                        <button id="refresh-sectors" class="refresh-btn">⟳</button>
                    </div>
                    <div id="sectors-list">
                        <div class="loading-overlay">
                            <div class="loader"></div>
                            <span>Scanning...</span>
                        </div>
                    </div>
                </div>
                <div class="live-badge">
                    <span class="pulse-dot"></span>
                    <span id="ws-status">Connecting to live feed...</span>
                </div>
            </div>

            <div class="main-content">
                <div class="card main-card">
                    <h2 id="active-sector-title" class="sector-title">Select a Sector</h2>
                    <div id="stocks-container" class="stocks-grid">
                        <div class="loading-overlay" style="display:none;" id="stocks-loader">
                            <div class="loader"></div>
                            <span>Analyzing Breakouts & Volumes...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/app.js?v=6"></script>
</body>
</html>
